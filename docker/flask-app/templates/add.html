{% extends "base.html" %}
{% block content %}
<h1>Add a New Word</h1>
<div class="form-container">
    <div class="form-section">
        <label>Word</label>
        <input type="text" id="word" placeholder="e.g. Serendipity">

        <label>Definition</label>
        <textarea id="definition" placeholder="What does it mean to you?"></textarea>

        <button onclick="searchImages()">Search Images</button>
    </div>

    <div id="image-grid" class="image-grid hidden"></div>

    <div id="selected-image" class="selected-image hidden">
        <h3>Selected Image</h3>
        <img id="preview" src="" alt="Selected">
        <p id="credit"></p>
        <button onclick="saveWord()">Save to Dictionary</button>
    </div>
</div>

<script>
    let selectedImageUrl = "";
    let selectedCredit = "";

    async function searchImages() {
        const word = document.getElementById("word").value;
        if (!word) return alert("Please enter a word first");

        const res = await fetch("/api/search-images", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: word })
        });
        const data = await res.json();

        const grid = document.getElementById("image-grid");
        grid.innerHTML = "";
        grid.classList.remove("hidden");

        data.images.forEach(img => {
            const div = document.createElement("div");
            div.className = "image-option";
            div.innerHTML = `<img src="${img.thumb}" alt="option">`;
            div.onclick = () => selectImage(img.url, img.credit);
            grid.appendChild(div);
        });
    }

    function selectImage(url, credit) {
        selectedImageUrl = url;
        selectedCredit = credit;
        document.getElementById("preview").src = url;
        document.getElementById("credit").textContent = credit;
        document.getElementById("selected-image").classList.remove("hidden");
    }

    async function saveWord() {
        const word = document.getElementById("word").value;
        const definition = document.getElementById("definition").value;
        if (!word || !definition || !selectedImageUrl) {
            return alert("Please fill in all fields and select an image");
        }

        const res = await fetch("/api/words", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                word,
                definition,
                image_url: selectedImageUrl,
                image_credit: selectedCredit
            })
        });

        if (res.ok) window.location.href = "/";
        else {
            const data = await res.json();
            alert(data.error);
        }
    }
</script>
{% endblock %}
